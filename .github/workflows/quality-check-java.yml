name: Java Quality Check Workflow

on:
  workflow_call:
    inputs:
      java_version:
        type: string
        default: "17"
      service:
        type: string
        required: true
      branch:
        type: string
        required: true

jobs:
  quality_java:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the ACTUAL service repository
      - name: Checkout service repository
        uses: actions/checkout@v4
        with:
          repository: syntaxnow-labs/${{ inputs.service }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: service

      # 2. Checkout workflow-platform repo (contains shared Maven settings.xml)
      - name: Checkout workflow-platform repository
        uses: actions/checkout@v4
        with:
          repository: syntaxnow-labs/workflow-platform
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          path: workflow-platform

      # 3. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java_version }}

      # 4. Run Maven using shared settings.xml
      - name: Run Quality Checks
        run: |
          echo "Running Java quality checks..."
          cd service
          mvn clean compile \
            -s ../workflow-platform/maven/syntaxnow-maven-settings.xml
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. Upload placeholder report
      - name: Upload placeholder report
        run: echo "Quality check placeholder" > quality-report.txt

      - uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.txt
